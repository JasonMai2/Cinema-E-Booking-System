server:
  port: 8080

spring:
  datasource:
    # Default to H2 in-memory for local dev when MySQL isn't available.
    # To use MySQL, set SPRING_DATASOURCE_URL to a MySQL JDBC URL (e.g. jdbc:mysql://localhost:3307/ecinema)
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:ecinema;DB_CLOSE_DELAY=-1;MODE=MySQL}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate     # validate | none | update | create-drop (use validate or none in dev)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
